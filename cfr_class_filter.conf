# CFR class filter configuration example
# This file shows how to define JAR and class prefix filter rules.

# ==================== JAR Name Filter Rules ====================
# Match JAR file name prefixes to skip whole JARs.
# Version suffixes are ignored during matching.
[jar]
# Spring framework JARs
spring-core
spring-context
spring-beans
spring-web
spring-webmvc

# Google Guava
guava

# Apache Commons
commons-lang3
commons-io
commons-collections4

# Jackson JSON
jackson-core
jackson-databind
jackson-annotations

# Netty
netty

axis2-ant-plugin

# ==================== Class Prefix Filter Rules ====================
# Match fully qualified class name prefixes to skip classes.
[class]
# Custom company/internal packages
com.mycompany.internal
com.mycompany.thirdparty

# Additional third-party packages
com.amazonaws
com.azure
com.fasterxml
com.google
com.microsoft
com.thoughtworks.xstream
gov.nist
