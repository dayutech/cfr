# CFR 类过滤配置文件示例
# 此文件演示如何配置类过滤规则

# ==================== JAR文件名过滤规则 ====================
# JAR文件名前缀匹配：根据JAR文件名过滤整个JAR包
# 匹配时会忽略版本号后缀
[jar]
# Spring框架相关JAR
spring-core
spring-context
spring-beans
spring-web
spring-webmvc

# Google Guava
guava

# Apache Commons
commons-lang3
commons-io
commons-collections4

# Jackson JSON处理
jackson-core
jackson-databind
jackson-annotations

# Netty网络框架
netty

# ==================== 类名过滤规则 ====================
# 全类名前缀匹配：根据类的全限定名过滤特定类
[class]
# 自定义公司内部包
com.mycompany.internal
com.mycompany.thirdparty

# 其他第三方库
org.joda.time
com.thoughtworks.xstream
